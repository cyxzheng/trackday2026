        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
      <button class="lightbox-control lightbox-prev" type="button" data-lightbox-prev aria-label="Previous photo">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
      <figure class="lightbox-figure">
        <img data-lightbox-image src="" alt="" />
        <figcaption data-lightbox-count></figcaption>
      </figure>
      <button class="lightbox-control lightbox-next" type="button" data-lightbox-next aria-label="Next photo">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
