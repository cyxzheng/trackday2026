<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Club Announcements | YVR GRC</title>
    <meta
      name="description"
      content="Club announcements, updates, and member messages from Vancouver GR Corolla Club."
    />
    <link rel="stylesheet" href="styles.css?v=20260528" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="page-shell app-bar">
        <div class="brand-mark">
          <img class="brand-logo" src="assets/branding/yvrgrc.svg" alt="" aria-hidden="true" />
          <span>YVR GRC</span>
        </div>
      </div>
    </header>

    <main id="main-content" class="page-shell content-shell">
      <section class="hero-block" aria-labelledby="page-title">
        <h1 id="page-title">Announcements</h1>
      </section>

      <section class="announcement-list" aria-label="Announcement list">
        <a
          class="announcement-card memorial-card"
          href="remembering-vic/"
          style="--announcement-image: url('/announcements/remembering-vic/assets/vic.png')"
        >
          <div class="announcement-card-image" aria-hidden="true"></div>
          <div class="announcement-card-body">
            <time class="announcement-date" datetime="2026-05-26">
              <span class="announcement-date-day">26</span>
              <span class="announcement-date-meta">may</span>
              <span class="announcement-date-meta">2026</span>
            </time>
            <div class="announcement-card-copy">
              <h2>Remembering Vic</h2>
              <div class="author-row">
                <span class="author-avatar memorial-avatar" aria-hidden="true"></span>
                <span class="author-name">Olaf Nyhus</span>
              </div>
            </div>
          </div>
        </a>

        <a
          class="announcement-card"
          href="a-message-from-say/"
          style="--announcement-image: url('a-message-from-say/assets/announcement-hero.jpg')"
        >
          <div class="announcement-card-image" aria-hidden="true"></div>
          <div class="announcement-card-body">
            <time class="announcement-date" datetime="2026-05-04">
              <span class="announcement-date-day">04</span>
              <span class="announcement-date-meta">may</span>
              <span class="announcement-date-meta">2026</span>
            </time>
            <div class="announcement-card-copy">
              <h2>A Message from Supreme Leader</h2>
              <div class="author-row">
                <span class="author-avatar" aria-hidden="true"></span>
                <span class="author-name">Say Phin Lim</span>
              </div>
            </div>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
